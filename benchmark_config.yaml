# AI IDE Token Benchmark Configuration
repo_path: "flask_project"
prompt_file: "benchmark_output/session_script.json"
output_dir: "benchmark_output"
output_format: "json"
proxy_port: 8080
timeout_seconds: 120

automation:
  kiro_path: "/usr/local/bin/kiro"
  idle_timeout: 30
  turn_timeout: 300
  startup_timeout: 60
  treatment_prefix_map:
    task_description: "miser-plan"
    clarifying_question: "miser-ask"
    implementation: "miser-fix"
    verification: "miser-ask"
